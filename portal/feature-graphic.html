<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1024px; height: 500px; overflow: hidden; }
  .banner {
    width: 1024px;
    height: 500px;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 40%, #2563eb 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 48px;
    padding: 0 80px;
    position: relative;
    overflow: hidden;
  }
  .banner::before {
    content: '';
    position: absolute;
    top: -100px; right: -100px;
    width: 400px; height: 400px;
    background: rgba(255,255,255,0.03);
    border-radius: 50%;
  }
  .banner::after {
    content: '';
    position: absolute;
    bottom: -150px; left: -50px;
    width: 500px; height: 500px;
    background: rgba(255,255,255,0.02);
    border-radius: 50%;
  }
  .left {
    flex: 1;
    z-index: 1;
  }
  .logo {
    max-width: 320px;
    margin-bottom: 24px;
  }
  .tagline {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 22px;
    font-weight: 400;
    color: rgba(255,255,255,0.85);
    line-height: 1.4;
  }
  .features {
    display: flex;
    gap: 20px;
    margin-top: 28px;
  }
  .feature {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.1);
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .phone {
    width: 220px;
    height: 400px;
    background: #fff;
    border-radius: 28px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    overflow: hidden;
    z-index: 1;
    display: flex;
    flex-direction: column;
  }
  .phone-header {
    background: linear-gradient(135deg, #0f172a, #1e3a5f);
    padding: 32px 16px 16px;
    text-align: center;
  }
  .phone-header p {
    font-family: -apple-system, sans-serif;
    color: white;
    font-size: 13px;
    font-weight: 600;
  }
  .phone-header .welcome {
    font-size: 11px;
    opacity: 0.7;
    margin-top: 4px;
  }
  .phone-body {
    padding: 12px;
    flex: 1;
  }
  .mini-card {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .mini-card-title {
    font-family: -apple-system, sans-serif;
    font-size: 10px;
    font-weight: 700;
    color: #2563eb;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .mini-card-sub {
    font-family: -apple-system, sans-serif;
    font-size: 9px;
    color: #64748b;
    margin-top: 2px;
  }
  .mini-btn {
    display: inline-block;
    background: #2563eb;
    color: white;
    font-family: -apple-system, sans-serif;
    font-size: 8px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 10px;
    margin-top: 6px;
  }
</style>
</head>
<body>
<div class="banner">
  <div class="left">
    <img src="/portal/images/vig-logo-wide.png" class="logo" alt="Vanguard Insurance Group">
    <div class="tagline">Your insurance, always in your pocket.</div>
    <div class="features">
      <div class="feature">&#x1F4CB; Policies</div>
      <div class="feature">&#x1F4DC; COIs</div>
      <div class="feature">&#x1F4B3; ID Cards</div>
    </div>
  </div>
  <div class="phone">
    <div class="phone-header">
      <p>Vanguard Insurance</p>
      <p class="welcome">Welcome back, John</p>
    </div>
    <div class="phone-body">
      <div class="mini-card">
        <div class="mini-card-title">Commercial Auto</div>
        <div class="mini-card-sub">Policy CA-2026-00001</div>
        <div class="mini-card-sub">National General Insurance</div>
        <div class="mini-btn">View Details</div>
      </div>
      <div class="mini-card">
        <div class="mini-card-title">Send COI</div>
        <div class="mini-card-sub">Email certificates instantly</div>
        <div class="mini-btn">Send Now</div>
      </div>
      <div class="mini-card">
        <div class="mini-card-title">ID Cards</div>
        <div class="mini-card-sub">Digital insurance cards</div>
        <div class="mini-btn">View Cards</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
